name: Bug Report
description: Report a bug
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      placeholder: A clear description of what the bug is.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Run `alaya ...`
        2. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What you expected to happen.
  - type: input
    id: version
    attributes:
      label: Alaya version
      placeholder: e.g. 0.1.0
  - type: dropdown
    id: contribute
    attributes:
      label: Interested in contributing a fix?
      options:
        - "Yes"
        - "No"
        - "Maybe — need guidance"
