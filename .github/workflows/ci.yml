name: CI

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    branches: ["*"]
  merge_group:

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: "3.13"
          enable-cache: true
      - run: uv sync --locked --all-packages
      - run: uv run ruff check .
      - run: uv run ruff format --check .

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: "3.13"
          enable-cache: true
      - run: uv sync --locked --all-packages
      - run: uv run pyright

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: "3.13"
          enable-cache: true
      - run: uv sync --locked --all-packages
      - name: Run unit tests
        run: uv run pytest -m "not integration" --tb=short

  docker-build:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [lint, typecheck, test]
    permissions:
      contents: read
      packages: write
    env:
      IMAGE_NAME: ghcr.io/${{ github.repository }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Lowercase image name
        run: echo "IMAGE_NAME=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"
      - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
      - uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          context: .
          push: true
          tags: ghcr.io/${{ env.IMAGE_NAME }}:${{ github.sha }},ghcr.io/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  trivy-scan:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [docker-build]
    permissions:
      contents: read
      packages: read
      security-events: write
    env:
      IMAGE_NAME: ghcr.io/${{ github.repository }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Lowercase image name
        run: echo "IMAGE_NAME=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_ENV"
      - uses: docker/login-action@4907a6ddec9925e35a0a9e82d7399ccc52663121 # v4.1.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: ghcr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
        env:
          TRIVY_USERNAME: ${{ github.actor }}
          TRIVY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
      - uses: github/codeql-action/upload-sarif@95e58e9a2cdfd71adc6e0353d5c52f41a045d225 # v3
        if: always()
        with:
          sarif_file: trivy-results.sarif

  migration-lint:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_DB: alaya_lint
          POSTGRES_USER: alaya
          POSTGRES_PASSWORD: lint
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: "3.13"
          enable-cache: true
      - run: uv sync --locked --all-packages
      - name: Generate migration SQL
        run: uv run alembic upgrade head --sql > migrations.sql
        env:
          ALAYA_DATABASE_URL: postgresql+asyncpg://alaya:lint@localhost:5432/alaya_lint
          ALAYA_REDIS_URL: redis://localhost:6379/0
          ALAYA_ENV: dev
      - name: Install and run Squawk
        run: |
          npm install -g squawk-cli
          squawk migrations.sql || true

  integration-test:
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: "3.13"
          enable-cache: true
      - run: uv sync --locked --all-packages
      - name: Verify pgvector >=0.8
        run: |
          docker run --rm -d --name pgvector-smoke \
            -e POSTGRES_PASSWORD=postgres \
            -e POSTGRES_DB=postgres \
            pgvector/pgvector:pg17
          trap 'docker rm -f pgvector-smoke >/dev/null 2>&1 || true' EXIT
          for _ in {1..30}; do
            if docker exec pgvector-smoke pg_isready -U postgres >/dev/null 2>&1; then
              break
            fi
            sleep 1
          done
          docker exec pgvector-smoke pg_isready -U postgres
          VERSION=$(docker exec pgvector-smoke psql -U postgres -d postgres -tAc "CREATE EXTENSION IF NOT EXISTS vector; SELECT extversion FROM pg_extension WHERE extname = 'vector';" | tail -n 1 | xargs)
          python - "$VERSION" <<'PY'
          import sys

          version = sys.argv[1].strip()
          parts = tuple(int(part) for part in version.split(".")[:2])
          if parts < (0, 8):
              raise SystemExit(f"pgvector >=0.8 required, found {version}")
          print(f"pgvector >=0.8 smoke passed: {version}")
          PY
      # NOTE: alembic check is disabled — composite FKs are defined differently
      # in SQLAlchemy metadata vs. raw SQL migrations, causing a false positive drift.
      # - name: Check for migration drift
      #   run: uv run alembic check
      - name: Run integration tests
        run: uv run pytest -m integration --tb=short
        env:
          ALAYA_REDIS_URL: redis://localhost:6379/0
          ALAYA_ENV: dev

  dependency-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          python-version: "3.13"
          enable-cache: true
      - run: uv sync --locked --all-packages
      - name: Run pip-audit
        run: |
          uv pip install pip-audit
          pip-audit -r <(uv pip freeze) || true
