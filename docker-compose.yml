services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_DB: alaya
      POSTGRES_USER: alaya
      POSTGRES_PASSWORD: alaya
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U alaya -d alaya"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrations:
    build: .
    command: >
      sh -c "alembic upgrade head && python docker/seed.py"
    env_file:
      - path: .env
        required: false
    environment:
      ALAYA_DATABASE_URL: ${ALAYA_DATABASE_URL:-postgresql+asyncpg://alaya:alaya@postgres:5432/alaya}
      ALAYA_REDIS_URL: ${ALAYA_REDIS_URL:-redis://redis:6379/0}
      ALAYA_ENV: ${ALAYA_ENV:-dev}
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - path: .env
        required: false
    environment:
      ALAYA_DATABASE_URL: ${ALAYA_DATABASE_URL:-postgresql+asyncpg://alaya:alaya@postgres:5432/alaya}
      ALAYA_REDIS_URL: ${ALAYA_REDIS_URL:-redis://redis:6379/0}
      ALAYA_ENV: ${ALAYA_ENV:-dev}
    depends_on:
      postgres:
        condition: service_healthy
      migrations:
        condition: service_completed_successfully
      redis:
        condition: service_started

  caddy:
    image: caddy:2-alpine
    ports:
      - "443:443"
      - "80:80"
    volumes:
      - ./docker/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - api

volumes:
  postgres_data:
  caddy_data:
  caddy_config:
