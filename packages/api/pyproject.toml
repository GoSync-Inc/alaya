[project]
name = "alayaos-api"
version = "0.1.0"
description = "AlayaOS REST API and MCP server"
requires-python = ">=3.13"
dependencies = [
    "alayaos-core",
    "fastapi>=0.115",
    "uvicorn[standard]>=0.32",
    "httpx>=0.27",
]

[tool.uv.sources]
alayaos-core = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
