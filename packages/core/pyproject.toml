[project]
name = "alayaos-core"
version = "0.1.0"
description = "AlayaOS core: models, extraction, consolidation, search, ontology"
requires-python = ">=3.13"
dependencies = [
    "sqlalchemy[asyncio]>=2.0",
    "pydantic>=2.0",
    "pydantic-settings>=2.0",
    "asyncpg>=0.29",
    "pgvector>=0.3",
    "alembic>=1.14",
    "redis>=5.0",
    "structlog>=24.0",
    "anthropic>=0.87.0",
    "taskiq>=0.11",
    "taskiq-redis>=1.0",
    "rapidfuzz>=3.0",
    "tiktoken>=0.9",
    "dateparser>=1.2",
    "transliterate>=1.10",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "httpx>=0.27",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"
