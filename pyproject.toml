[project]
name = "alayaos"
version = "0.1.0"
description = "Corporate memory platform"
requires-python = ">=3.13"

[tool.uv.workspace]
members = ["packages/*"]

[tool.uv.sources]
alayaos-core = { workspace = true }
alayaos-api = { workspace = true }
alayaos-cli = { workspace = true }
alayaos-connectors = { workspace = true }

[tool.hatch.build.targets.wheel]
packages = []

[dependency-groups]
dev = [
    "pyright>=1.1.408",
    "ruff>=0.15.9",
]
