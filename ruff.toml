target-version = "py313"
line-length = 120

[lint]
select = [
    "E",      # pycodestyle errors
    "W",      # pycodestyle warnings
    "F",      # pyflakes
    "I",      # isort
    "N",      # pep8-naming
    "UP",     # pyupgrade
    "B",      # flake8-bugbear
    "A",      # flake8-builtins
    "C4",     # flake8-comprehensions
    "SIM",    # flake8-simplify
    "TCH",    # flake8-type-checking
    "RUF",    # ruff-specific
]
ignore = [
    "E501",   # line too long (handled by formatter)
    "TC003",  # SQLAlchemy Mapped[] requires datetime at runtime, not just TYPE_CHECKING
]

[lint.isort]
known-first-party = ["alayaos_core", "alayaos_api", "alayaos_cli", "alayaos_connectors"]
